# AI GC START
services:
  feishu-chat-service:
    build:
      context: .
      dockerfile: Dockerfile
    image: feishu-chat-service:latest
    container_name: feishu-chat-service
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
# AI GC END
